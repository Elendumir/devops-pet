name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build
        run: docker compose build

      - name: Create .env
        run: | 
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          
      - name: Run
        run: docker compose up -d

      - name: Wait for app
        run: |
          for i in {1..10}; do
                  if curl -s http://localhost:8080/backend/ > /dev/null; then
                    exit 0
                  fi
                  sleep 2
                done
                exit 1

      - name: Test backend
        run: curl -f  http://localhost:8080/backend/index.php
        
      - name: Show logs
        if: failure()
        run: docker compose logs
        
      - name: Down
        if: always()
        run: docker compose down
