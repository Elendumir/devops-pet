server {
    listen 80;

    root /var/www/frontend;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
    
    
    location /backend/ {
        alias /var/www/backend/;
    }

    location ~ ^/backend/(.+\.php)$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/$1;
    }
}
