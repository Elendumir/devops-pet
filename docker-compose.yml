version: "3.8"

services:
  nginx:
    image: elendumir/devops-pet-nginx:latest
    ports:
      - "8080:80"
    depends_on:
      - php

  php:
    image: elendumir/devops-pet-php:latest
    depends_on:
      - mysql

  mysql:
    image: mysql:5.7
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql 
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      
volumes:
  mysql_data:      

